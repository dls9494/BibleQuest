<body class="bg-custom-gradient min-h-screen text-on-surface flex flex-col items-center justify-center p-container-padding relative overflow-hidden">
<!-- Decorative background elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">

<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-primary-container/20 rounded-full blur-3xl mix-blend-screen"></div>
</div>

<main class="w-full max-w-md flex flex-col items-center z-10 w-full relative">

<div class="flex flex-col items-center mb-section-gap opacity-0 scale-0 animate-bounce-in">
<div class="w-24 h-24 rounded-full bg-success/20 flex items-center justify-center mb-4 border border-success/30 shadow-[0_0_30px_rgba(74,222,128,0.2)]">

</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-success glow-text-success">Correct!</h1>
</div>

<div class="flex items-start gap-4 mb-6">
<div class="mt-1 flex-shrink-0">

</div>
<div>

</div>
</div>
<div class="w-full h-[1px] bg-white/10 mb-6"></div>
<div class="flex items-start gap-4">
<div class="mt-1 flex-shrink-0">
<span class="material-symbols-outlined text-primary text-2xl">lightbulb</span>
</div>
<div class="space-y-3">
<p class="font-scripture text-body-md text-on-surface leading-relaxed">
                        And God said, 'Let there be light,' and there was light.
                    </p>
<p class="font-telugu text-[15px] text-on-surface-variant leading-relaxed">
                        (మరియు దేవుడు వెలుగు కలుగును గాక అని పలికెను; అప్పుడు వెలుగు కలిగెను.)
                    </p>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-container-padding pb-8 z-20 flex justify-center bg-gradient-to-t from-background/80 to-transparent">

<button class="w-full bg-primary-container text-white font-label-md text-label-md font-bold py-4 rounded-xl glow-button active:scale-95 transition-all duration-200 flex items-center justify-center gap-2">

<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>

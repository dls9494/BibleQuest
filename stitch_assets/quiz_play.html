<body class="text-on-background font-body-md antialiased overflow-hidden flex flex-col h-screen">

<header class="w-full flex justify-between items-center px-container-padding h-16 pt-4 shrink-0">
<button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center hover:bg-white/10 transition-colors">

<div class="font-headline-md text-headline-md text-primary font-bold tracking-tight">

<div class="w-10 h-10"></div> <!-- Spacer -->

<!-- Main Content Area -->
<main class="flex-grow flex flex-col px-container-padding py-element-gap overflow-y-auto">
<!-- Timer Capsule -->
<div class="w-full h-3 bg-surface-container-highest rounded-full mb-8 overflow-hidden transition-transform duration-200" id="timer-container">
<div class="h-full rounded-full transition-all duration-[50ms] ease-linear" id="timer-bar" style="width: 100%; background-color: rgb(38, 137, 12);"></div>
</div>

</div>

<div class="grid grid-cols-2 gap-4 flex-grow mb-8">
<!-- Option 1: Red -->
<button class="bg-kahoot-red rounded-xl p-4 flex flex-col items-center justify-center text-white active:scale-95 transition-transform shadow-lg relative overflow-hidden group">
<div class="absolute inset-0 bg-black/10 opacity-0 group-active:opacity-100 transition-opacity"></div>

</button>
<!-- Option 2: Blue -->

</button>
<!-- Option 3: Yellow -->

            Submit
        </button>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const duration = 15000;
        const intervalTime = 50;
        let elapsed = 0;
        const timerBar = document.getElementById('timer-bar');
        const timerContainer = document.getElementById('timer-container');

        const updateTimer = setInterval(() => {
            elapsed += intervalTime;
            const progress = Math.max(0, 1 - (elapsed / duration));
            const percentage = progress * 100;
            
            timerBar.style.width = percentage + '%';
            
            // Color transition logic
            if (percentage > 50) {
                // 100% to 50%: Green to Yellow
                const p = (percentage - 50) / 50; // 1 to 0
                // Green: #26890C (38, 137, 12)
                // Yellow: #D89E00 (216, 158, 0)
                const r = Math.round(216 + (38 - 216) * p);
                const g = Math.round(158 + (137 - 158) * p);
                const b = Math.round(0 + (12 - 0) * p);
                timerBar.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
            } else {
                // 50% to 0%: Yellow to Red
                const p = percentage / 50; // 1 to 0
                // Yellow: #D89E00 (216, 158, 0)
                // Red: #E21B3C (226, 27, 60)
                const r = Math.round(226 + (216 - 226) * p);
                const g = Math.round(27 + (158 - 27) * p);
                const b = Math.round(60 + (0 - 60) * p);
                timerBar.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
            }

            // Pulse effect when under 30%
            if (percentage <= 30) {
                if (!timerContainer.classList.contains('pulse-danger')) {
                    timerContainer.classList.add('pulse-danger');
                }
            }
            
            // Stop timer when done
            if (elapsed >= duration) {
                clearInterval(updateTimer);
                timerBar.style.width = '0%';
            }
        }, intervalTime);
    });
</script>

name: bible_quiz
description: Multilingual Bible Quiz App - Kahoot Style
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  firebase_auth: ^6.5.2
  provider: ^6.1.2
  confetti: ^0.8.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.2
  firebase_storage: ^13.4.2
  share_plus: ^10.0.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.0
  flutter_tts: ^4.0.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/real_questions.json
    - assets/bible/
    - assets/bible/telugu_ov.json
    - assets/bible/english_asv.json
    - assets/bible/english_web.json
    - assets/bible/english_darby.json
    - assets/banners/
    - assets/avatars/
    - assets/icons/3d/
  fonts:
    - family: NotoSansTelugu
      fonts:
        - asset: assets/fonts/NotoSansTelugu-Regular.ttf
        - asset: assets/fonts/NotoSansTelugu-Bold.ttf
          weight: 700
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
        - asset: assets/fonts/NotoSansTamil-Bold.ttf
          weight: 700
    - family: NotoSansMalayalam
      fonts:
        - asset: assets/fonts/NotoSansMalayalam-Regular.ttf
        - asset: assets/fonts/NotoSansMalayalam-Bold.ttf
          weight: 700
    - family: NotoSansKannada
      fonts:
        - asset: assets/fonts/NotoSansKannada-Regular.ttf
        - asset: assets/fonts/NotoSansKannada-Bold.ttf
          weight: 700
    - family: NotoSerif
      fonts:
        - asset: assets/fonts/NotoSerif-Regular.ttf
        - asset: assets/fonts/NotoSerif-Bold.ttf
          weight: 700
    - family: NotoSerifTelugu
      fonts:
        - asset: assets/fonts/NotoSerifTelugu-Regular.ttf
        - asset: assets/fonts/NotoSerifTelugu-Bold.ttf
          weight: 700

name: bible_quiz
description: Multilingual Bible Quiz App - Kahoot Style
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  firebase_auth: ^6.5.2
  firebase_crashlytics: ^5.2.3
  firebase_analytics: ^12.0.2
  provider: ^6.1.2
  confetti: ^0.8.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.2
  firebase_storage: ^13.4.2
  share_plus: ^13.1.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.3.1
  timeago: ^3.0.0
  path_provider: ^2.1.0
  flutter_tts: ^4.0.0
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  audio_service: ^0.18.15
  audio_session: ^0.2.3
  connectivity_plus: ^7.1.1
  google_sign_in: ^6.2.1
  flutter_riverpod: ^3.3.2
  sqflite: ^2.4.3
  path: ^1.9.1
  go_router: ^17.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/real_questions.json
    - assets/bible/telugu_ov.sqlite
    - assets/bible/telugu_wbtc.sqlite
    - assets/bible/telugu_irv.sqlite
    - assets/bible/kjv.sqlite
    - assets/bible/asv.sqlite
    - assets/bible/web.sqlite
    - assets/bible/darby.sqlite
    - assets/banners/
    - assets/avatars/
    - assets/icons/flat/
  fonts:
    - family: NotoSansTelugu
      fonts:
        - asset: assets/fonts/NotoSansTelugu-Regular.ttf
        - asset: assets/fonts/NotoSansTelugu-Bold.ttf
          weight: 700
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
        - asset: assets/fonts/NotoSansTamil-Bold.ttf
          weight: 700
    - family: NotoSansMalayalam
      fonts:
        - asset: assets/fonts/NotoSansMalayalam-Regular.ttf
        - asset: assets/fonts/NotoSansMalayalam-Bold.ttf
          weight: 700
    - family: NotoSansKannada
      fonts:
        - asset: assets/fonts/NotoSansKannada-Regular.ttf
        - asset: assets/fonts/NotoSansKannada-Bold.ttf
          weight: 700
    - family: NotoSerif
      fonts:
        - asset: assets/fonts/NotoSerif-Regular.ttf
        - asset: assets/fonts/NotoSerif-Bold.ttf
          weight: 700
    - family: NotoSerifTelugu
      fonts:
        - asset: assets/fonts/NotoSerifTelugu-Regular.ttf
        - asset: assets/fonts/NotoSerifTelugu-Bold.ttf
          weight: 700
